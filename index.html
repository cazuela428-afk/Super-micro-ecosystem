<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroSim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #060c16;
    color: #b0c4d8;
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 10px 12px;
    gap: 8px;
    user-select: none;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    letter-spacing: 0.18em;
    color: #daeeff;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .org-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border: 1px solid #1e2e40;
    border-radius: 3px;
    background: #0b1622;
    color: #90aac0;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .org-btn:hover { border-color: #3a5a78; background: #111f2e; color: #c0d8ea; }
  .org-btn.active { border-color: #5090c0; background: #122030; color: #e0f2ff; }

  .org-icon {
    width: 11px; height: 11px; flex-shrink: 0;
  }
  .org-icon.sq { border-radius: 0; }
  .org-icon.ci { border-radius: 50%; }

  .sep { width: 1px; height: 22px; background: #1e2e40; flex-shrink: 0; }

  .action-btn {
    padding: 5px 13px;
    border: 1px solid;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .del-btn  { background: #130c0c; color: #f08080; border-color: #2a1515; }
  .del-btn:hover, .del-btn.active { background: #1e1010; border-color: #f08080; }
  .clr-btn  { background: #130c0c; color: #fca5a5; border-color: #2a1515; }
  .clr-btn:hover { background: #220e0e; border-color: #fca5a5; }

  #wrap {
    border: 1px solid #1e2e40;
    padding: 2px;
    background: #0b1622;
    border-radius: 2px;
    box-shadow: 0 0 30px rgba(0,60,120,0.15);
  }

  #sim {
    display: block;
    background: #ffffff;
    cursor: crosshair;
  }

  .stats {
    display: flex;
    gap: 14px;
    font-size: 0.63rem;
    color: #50708a;
    flex-wrap: wrap;
    justify-content: center;
    letter-spacing: 0.04em;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .sdot { width: 9px; height: 9px; flex-shrink: 0; }
  .sdot.sq { border-radius: 1px; }
  .sdot.ci { border-radius: 50%; }

  .legend {
    font-size: 0.58rem;
    color: #3a5060;
    text-align: center;
    line-height: 1.7;
    max-width: 760px;
  }
</style>
</head>
<body>

<h1>🔬 MicroSim</h1>

<div class="controls">
  <button class="org-btn active" data-type="plant"  onclick="sel('place','plant')">
    <div class="org-icon sq" style="background:#22c55e"></div>Planta
  </button>
  <button class="org-btn" data-type="fungus" onclick="sel('place','fungus')">
    <div class="org-icon sq" style="background:#92400e"></div>Hongo
  </button>
  <button class="org-btn" data-type="herb"   onclick="sel('place','herb')">
    <div class="org-icon ci" style="background:#3b82f6"></div>Bacteria Herbívora
  </button>
  <button class="org-btn" data-type="pred"   onclick="sel('place','pred')">
    <div class="org-icon ci" style="background:#ef4444"></div>Bacteria Depredadora
  </button>
  <button class="org-btn" data-type="poison" onclick="sel('place','poison')">
    <div class="org-icon ci" style="background:#a855f7"></div>Bacteria Venenosa
  </button>
  <div class="sep"></div>
  <button class="action-btn del-btn" id="del-btn" onclick="sel('delete',null)">✕ Borrar</button>
  <button class="action-btn clr-btn" onclick="clearAll()">⚠ Borrar Todo</button>
</div>

<div id="wrap"><canvas id="sim"></canvas></div>

<div class="stats" id="stats"></div>

<div class="legend">
  Haz clic para colocar organismos &nbsp;·&nbsp;
  <span style="color:#22c55e">■ Planta</span> &nbsp;·&nbsp;
  <span style="color:#92400e">■ Hongo</span> (estático, se reproduce hacia plantas) &nbsp;·&nbsp;
  <span style="color:#3b82f6">● Herbívora</span> &nbsp;·&nbsp;
  <span style="color:#ef4444">● Depredadora</span> (más lenta) &nbsp;·&nbsp;
  <span style="color:#a855f7">● Venenosa</span> (envenena su entorno)
</div>

<script>
// ─── Canvas ───────────────────────────────────────────────
const canvas = document.getElementById('sim');
const ctx    = canvas.getContext('2d');
const W = 754, H = 444;
canvas.width  = W;
canvas.height = H;

// ─── Configs ──────────────────────────────────────────────
const CFG = {
  plant: {
    color:'#22c55e', size:9,  isSquare:true,  isStatic:true,
  },
  fungus: {
    color:'#92400e', size:9,  isSquare:true,  isStatic:true,
    eMax:200, drain:0.012, detRange:85,
    repAt:155, repCost:78, repSpread:58, repCooldown:350,
    feedGain:75,            // energy fed to all fungi when born on plant
    foodTypes:[]
  },
  herb: {
    color:'#3b82f6', radius:6, isSquare:false, isStatic:false,
    eMax:100, drain:0.065, speed:1.75, detRange:82,
    repAt:82, repCost:40, repCooldown:260,
    eatGain:48,
    foodTypes:['plant','fungus']
  },
  pred: {
    color:'#ef4444', radius:7, isSquare:false, isStatic:false,
    eMax:130, drain:0.085, speed:1.1, detRange:90,
    repAt:100, repCost:52, repCooldown:310,
    eatGain:58,
    foodTypes:['herb','fungus']
  },
  poison: {
    color:'#a855f7', radius:6, isSquare:false, isStatic:false,
    eMax:100, drain:0.065, speed:1.65, detRange:80,
    repAt:82, repCost:40, repCooldown:260,
    eatGain:48,
    poisonRange:58, poisonDrain:0.20,
    foodTypes:['plant','fungus']
  }
};

// ─── State ────────────────────────────────────────────────
let organisms = [];
let mode = 'place';
let selType = 'plant';
let uid = 0;

// ─── Organism ─────────────────────────────────────────────
class Org {
  constructor(type, x, y) {
    this.id   = ++uid;
    this.type = type;
    this.x    = x;
    this.y    = y;
    this.dead = false;

    const c = CFG[type];

    if (type === 'plant') {
      this.energy = Infinity;
    } else {
      this.energy = c.eMax * 0.68;
      this.eMax   = c.eMax;
    }

    this.vx = 0; this.vy = 0;
    if (!c.isStatic) {
      const a = Math.random() * Math.PI * 2;
      this.vx = Math.cos(a) * c.speed;
      this.vy = Math.sin(a) * c.speed;
    }

    this.repCD = 0; // reproduction cooldown
  }

  get c()   { return CFG[this.type]; }
  get r()   { return this.c.isSquare ? this.c.size / 2 : this.c.radius; }
  get size(){ return this.c.isSquare ? this.c.size : this.c.radius * 2; }

  dist(o) {
    const dx = this.x - o.x, dy = this.y - o.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  overlaps(o) { return this.dist(o) < this.r + o.r + 0.5; }

  draw() {
    const c = this.c;
    ctx.fillStyle = c.color;
    if (c.isSquare) {
      const s = c.size;
      ctx.fillRect(this.x - s/2, this.y - s/2, s, s);
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, c.radius, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

// ─── Simulation Loop ──────────────────────────────────────
function update() {
  const alive = organisms.filter(o => !o.dead);
  const toAdd = [];

  // 1. Energy drain
  for (const o of alive) {
    if (o.type === 'plant') continue;
    o.energy -= o.c.drain;
    if (o.repCD > 0) o.repCD--;
    if (o.energy <= 0) o.dead = true;
  }

  // 2. Poison aura — bacteria near poison bacteria drain faster
  const poisoners = alive.filter(o => o.type === 'poison' && !o.dead);
  for (const p of poisoners) {
    for (const o of alive) {
      if (o.dead || o.type === 'plant' || o.type === 'fungus') continue;
      if (p.dist(o) < p.c.poisonRange) {
        o.energy -= p.c.poisonDrain;
        if (o.energy <= 0) o.dead = true;
      }
    }
  }

  const stillAlive = alive.filter(o => !o.dead);

  // 3. Per-organism behavior
  for (const o of stillAlive) {
    if (o.dead) continue;
    if (o.type === 'plant') continue;

    // ── FUNGUS ──
    if (o.type === 'fungus') {
      if (o.energy >= o.c.repAt && o.repCD <= 0) {
        // Find nearest plant in range
        let target = null, best = o.c.detRange;
        for (const p of stillAlive) {
          if (p.type !== 'plant') continue;
          const d = o.dist(p);
          if (d < best) { best = d; target = p; }
        }

        o.energy -= o.c.repCost;
        o.repCD   = o.c.repCooldown;

        // Direction toward plant (or random)
        let dx, dy;
        if (target) {
          const d = o.dist(target); dx = (target.x - o.x)/d; dy = (target.y - o.y)/d;
        } else {
          const a = Math.random() * Math.PI*2; dx = Math.cos(a); dy = Math.sin(a);
        }

        const sp = o.c.repSpread;
        const jx = (Math.random()-0.5)*18, jy = (Math.random()-0.5)*18;
        const nx = Math.max(5, Math.min(W-5, o.x + dx*sp + jx));
        const ny = Math.max(5, Math.min(H-5, o.y + dy*sp + jy));

        const child = new Org('fungus', nx, ny);

        // Check if child lands on a plant → feed ALL fungi
        let onPlant = false;
        for (const p of stillAlive) {
          if (p.type === 'plant' && child.dist(p) < child.r + p.r + 2) {
            onPlant = true; break;
          }
        }
        if (onPlant) {
          for (const f of stillAlive) {
            if (f.type === 'fungus' && !f.dead) {
              f.energy = Math.min(f.eMax, f.energy + o.c.feedGain);
            }
          }
          // Also feed the child
          child.energy = Math.min(child.eMax, child.energy + o.c.feedGain);
        }

        toAdd.push(child);
      }
      continue;
    }

    // ── MOBILE BACTERIA ──
    const spd = o.c.speed;
    const range = o.c.detRange;
    const foodTypes = o.c.foodTypes;

    // Find nearest food in detection range
    let target = null, bestDist = range;
    for (const f of stillAlive) {
      if (!foodTypes.includes(f.type)) continue;
      const d = o.dist(f);
      if (d < bestDist) { bestDist = d; target = f; }
    }

    if (target) {
      // Steer toward food
      const d = o.dist(target);
      if (d > 0) {
        o.vx += ((target.x - o.x)/d * spd - o.vx) * 0.18;
        o.vy += ((target.y - o.y)/d * spd - o.vy) * 0.18;
      }
    } else {
      // Random walk with momentum
      o.vx += (Math.random()-0.5) * 0.35;
      o.vy += (Math.random()-0.5) * 0.35;
    }

    // Clamp speed
    const spd2 = Math.sqrt(o.vx*o.vx + o.vy*o.vy);
    if (spd2 > spd) { o.vx = o.vx/spd2*spd; o.vy = o.vy/spd2*spd; }

    // Move
    o.x += o.vx;
    o.y += o.vy;

    // Boundary bounce
    const rr = o.r;
    if (o.x - rr < 0)   { o.x = rr;   o.vx =  Math.abs(o.vx); }
    if (o.x + rr > W)   { o.x = W-rr; o.vx = -Math.abs(o.vx); }
    if (o.y - rr < 0)   { o.y = rr;   o.vy =  Math.abs(o.vy); }
    if (o.y + rr > H)   { o.y = H-rr; o.vy = -Math.abs(o.vy); }

    // Eat (first overlapping food)
    for (const f of stillAlive) {
      if (f.dead || !foodTypes.includes(f.type)) continue;
      if (o.overlaps(f)) {
        f.dead = true;
        o.energy = Math.min(o.eMax, o.energy + o.c.eatGain);
        break;
      }
    }

    // Reproduce
    if (o.energy >= o.c.repAt && o.repCD <= 0 && !o.dead) {
      o.energy -= o.c.repCost;
      o.repCD   = o.c.repCooldown;

      const a = Math.random() * Math.PI*2;
      const spread = rr * 2 + 6;
      const nx = Math.max(rr, Math.min(W-rr, o.x + Math.cos(a)*spread));
      const ny = Math.max(rr, Math.min(H-rr, o.y + Math.sin(a)*spread));

      const child = new Org(o.type, nx, ny);
      child.vx = -o.vx * 0.7 + (Math.random()-0.5)*0.4;
      child.vy = -o.vy * 0.7 + (Math.random()-0.5)*0.4;
      toAdd.push(child);
    }
  }

  // Merge
  organisms = organisms.filter(o => !o.dead);
  organisms.push(...toAdd);

  // Population cap (prevent browser lag)
  if (organisms.length > 550) {
    const movable = organisms.filter(o => o.type !== 'plant' && o.type !== 'fungus')
                             .sort((a,b) => a.energy - b.energy);
    const excess = organisms.length - 550;
    const ids = new Set(movable.slice(0, excess).map(o => o.id));
    organisms = organisms.filter(o => !ids.has(o.id));
  }
}

// ─── Draw ─────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Poison auras (subtle visual)
  ctx.lineWidth = 1;
  for (const o of organisms) {
    if (o.type !== 'poison') continue;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.c.poisonRange, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(168,85,247,0.10)';
    ctx.stroke();
  }

  // Organisms
  for (const o of organisms) o.draw();
}

// ─── Stats ────────────────────────────────────────────────
const LABELS = { plant:'Plantas', fungus:'Hongos', herb:'Herbívoras', pred:'Depredadoras', poison:'Venenosas' };
const COLORS  = { plant:'#22c55e', fungus:'#92400e', herb:'#3b82f6', pred:'#ef4444', poison:'#a855f7' };
const SQ      = { plant:true, fungus:true };

let frame = 0;
function updateStats() {
  const cnt = { plant:0, fungus:0, herb:0, pred:0, poison:0 };
  for (const o of organisms) cnt[o.type]++;
  document.getElementById('stats').innerHTML =
    Object.entries(cnt).map(([t, n]) =>
      `<div class="stat">
         <div class="sdot ${SQ[t]?'sq':'ci'}" style="background:${COLORS[t]}"></div>
         ${LABELS[t]}: ${n}
       </div>`
    ).join('');
}

// ─── Main Loop ────────────────────────────────────────────
function loop() {
  update();
  draw();
  if (++frame % 12 === 0) updateStats();
  requestAnimationFrame(loop);
}
loop();

// ─── UI ───────────────────────────────────────────────────
function sel(m, type) {
  mode = m; selType = type;
  document.querySelectorAll('.org-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('del-btn').classList.remove('active');
  if (m === 'place') {
    const b = document.querySelector(`[data-type="${type}"]`);
    if (b) b.classList.add('active');
    canvas.style.cursor = 'crosshair';
  } else {
    document.getElementById('del-btn').classList.add('active');
    canvas.style.cursor = 'pointer';
  }
}

function clearAll() { organisms = []; }

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top)  * (H / rect.height);

  if (mode === 'place') {
    organisms.push(new Org(selType, x, y));
  } else {
    // Delete closest within 16px
    let closest = null, bestD = 16;
    for (const o of organisms) {
      const d = o.dist({x, y});
      if (d < bestD) { bestD = d; closest = o; }
    }
    if (closest) organisms = organisms.filter(o => o !== closest);
  }
});
</script>
</body>
</html>
