<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super micro-ecosystem</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #simCanvas {
            background-color: white;
            border: 2px solid #333;
            cursor: crosshair;
        }
        .controls {
            margin-top: 15px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 800px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 14px;
        }
        button {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        button:hover { background-color: #eee; }
    </style>
</head>
<body>

    <canvas id="simCanvas" width="600" height="600"></canvas>

    <div class="controls">
        <div class="control-group">
    <label><strong>Select to add:</strong></label>
    <div>
        <input type="radio" id="t-herb" name="type" value="herbivora" checked> <label for="t-herb">Herbivore</label>
        <input type="radio" id="t-carn" name="type" value="carnivora"> <label for="t-carn">Carnivore</label>
        <input type="radio" id="t-hong" name="type" value="hongo"> <label for="t-hong">Fungi</label>
        <input type="radio" id="t-viru" name="type" value="virus"> <label for="t-viru">Virus</label>
    </div>
</div>

<div class="control-group">
    <label>Viscosity: <span id="viscVal">1</span></label>
    <input type="range" id="viscosity" min="1" max="10" value="1" step="0.5">
</div>

<div class="control-group">
    <label>Food Spawn: <span id="foodVal">5</span></label>
    <input type="range" id="foodRate" min="0" max="20" value="5">
</div>

<div class="control-group">
    <label>Mutation Prob: <span id="mutVal">10</span>%</label>
    <input type="range" id="mutationProb" min="0" max="100" value="10">
</div>

<div class="control-group" style="flex-direction: row; align-items: center;">
    <button id="btnPause">Pause/Resume</button>
    <button id="btnClearBeings">Clear Organisms</button>
    <button id="btnClearAll">Clear ALL</button>
</div>
<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    let entities = [];
    let food = [];
    let isPaused = true;
    let tick = 0;

    const baseSpeedMultiplier = 0.3;

    const viscoInput = document.getElementById('viscosity');
    const foodInput = document.getElementById('foodRate');
    const mutInput = document.getElementById('mutationProb');
    
    viscoInput.oninput = () => document.getElementById('viscVal').innerText = viscoInput.value;
    foodInput.oninput = () => document.getElementById('foodVal').innerText = foodInput.value;
    mutInput.oninput = () => document.getElementById('mutVal').innerText = mutInput.value;

    document.getElementById('btnPause').onclick = () => isPaused = !isPaused;
    document.getElementById('btnClearBeings').onclick = () => entities = [];
    document.getElementById('btnClearAll').onclick = () => { entities = []; food = []; };

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const type = document.querySelector('input[name="type"]:checked').value;
        spawnEntity(x, y, type);
    });

    const mutations = {
        'herbivora': {
            'blue': { speedMod: 1, energyMod: 1 },
            'green': { speedMod: 0.5, energyMod: 0.5 },
            'pink': { speedMod: 1.5, energyMod: 1.5 }
        },
        'carnivora': {
            'red': { speedMod: 1, energyMod: 1 },
            'purple': { speedMod: 1, energyMod: 1.5, aura: true },
            'yellow': { speedMod: 0.5, energyMod: 0.5 }
        },
        'hongo': {
            'brown': { speedMod: 1, energyMod: 1 },
            'orange': { speedMod: 1.5, energyMod: 1.2 }
        },
        'virus': {
            'blue': { speedMod: 1, energyMod: 1 },
            'pink': { speedMod: 1.5, energyMod: 1.5 },
            'green': { speedMod: 0.5, energyMod: 0.5 },
            'orange': { speedMod: 1.2, energyMod: 1.2 },
            'purple': { speedMod: 1, energyMod: 1.5, aura: true }
        }
    };

    function getRandomColor(type) {
        const keys = Object.keys(mutations[type]);
        return keys[Math.floor(Math.random() * keys.length)];
    }

    function spawnEntity(x, y, type, color = null) {
        let baseColor = color;
        if (!baseColor) {
            if (type === 'herbivora') baseColor = 'blue';
            if (type === 'carnivora') baseColor = 'red';
            if (type === 'hongo') baseColor = 'brown';
            if (type === 'virus') baseColor = 'blue';
        }

        const stats = mutations[type][baseColor];
        let ent = {
            type: type, color: baseColor, x: x, y: y,
            vx: (Math.random() - 0.5), vy: (Math.random() - 0.5),
            energy: 100, angle: 0, offset: Math.random() * Math.PI * 2, aura: stats.aura || false
        };

        // ENERGÍA AJUSTADA: Menos consumo para carnívoras y virus
        if (type === 'herbivora') {
            ent.size = 6; ent.speed = 1.5 * stats.speedMod; ent.energyLoss = 0.1 * stats.energyMod;
        } else if (type === 'carnivora') {
            ent.size = 10; ent.speed = 1 * stats.speedMod; ent.energyLoss = 0.125 * stats.energyMod;
        } else if (type === 'hongo') {
            ent.size = 4; ent.speed = 0.3 * stats.speedMod; ent.energyLoss = 0.01 * stats.energyMod;
        } else if (type === 'virus') {
            ent.size = 3; ent.speed = 3.5 * stats.speedMod; ent.energyLoss = 0.75 * stats.energyMod;
            ent.energy = 150; 
        }
        entities.push(ent);
    }

    function findTarget(entity) {
        let targets = [];
        if (entity.type === 'herbivora' || entity.type === 'hongo') targets = food;
        if (entity.type === 'carnivora') targets = entities.filter(e => e.type === 'herbivora' || e.type === 'hongo');
        if (entity.type === 'virus') targets = entities.filter(e => e !== entity && e.type !== 'virus');
        let closest = null; let minDist = Infinity;
        for (let t of targets) {
            let d = Math.hypot(entity.x - t.x, entity.y - t.y);
            if (d < minDist) { minDist = d; closest = t; }
        }
        return closest;
    }

    function loop() {
        requestAnimationFrame(loop);
        
        // Dibujado constante para que los botones de borrar funcionen visualmente en pausa
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar comida
        ctx.fillStyle = 'black';
        for (let f of food) {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fill();
        }

        if (!isPaused) {
            tick++;
            let foodRateVal = parseInt(foodInput.value);
            if (foodRateVal > 0 && Math.random() < (foodRateVal / 100)) {
                food.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 2 });
            }

            let viscosity = parseFloat(viscoInput.value);
            let mutationProb = parseFloat(mutInput.value) / 100;

            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.energy -= e.energyLoss;
                if (e.energy <= 0) { entities.splice(i, 1); continue; }

                if (e.aura) {
                    for (let other of entities) {
                        if (other !== e && other.type !== e.type && Math.hypot(e.x - other.x, e.y - other.y) < e.size * 5) {
                            other.energy -= 0.8; e.energy += 0.4;
                            ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(other.x, other.y);
                            ctx.strokeStyle = "rgba(128, 0, 128, 0.15)"; ctx.stroke();
                        }
                    }
                }

                let target = findTarget(e);
                if (target) {
                    let dx = target.x - e.x; let dy = target.y - e.y;
                    let dist = Math.hypot(dx, dy);
                    e.vx = (dx / dist) * e.speed; e.vy = (dy / dist) * e.speed;
                    e.angle = Math.atan2(dy, dx);
                    if (dist < e.size + (target.size || 5)) {
                        if (e.type === 'herbivora' || e.type === 'hongo') {
                            food.splice(food.indexOf(target), 1); e.energy += 30;
                        } else if (e.type === 'carnivora') {
                            entities.splice(entities.indexOf(target), 1); e.energy += 50;
                        } else if (e.type === 'virus') {
                            e.energy += 40; target.energy -= 15;
                            if (e.energy > 200) {
                                e.energy /= 2;
                                let nc = Math.random() < mutationProb ? getRandomColor(e.type) : e.color;
                                spawnEntity(e.x - 5, e.y - 5, e.type, nc);
                            }
                            e.vx *= -1; e.vy *= -1;
                        }
                    }
                } else {
                    e.angle += (Math.random() - 0.5) * 0.2;
                    e.vx = Math.cos(e.angle) * e.speed; e.vy = Math.sin(e.angle) * e.speed;
                }

                e.x += (e.vx * baseSpeedMultiplier) / viscosity;
                e.y += (e.vy * baseSpeedMultiplier) / viscosity;

                if (e.x < 0 || e.x > canvas.width) e.vx *= -1;
                if (e.y < 0 || e.y > canvas.height) e.vy *= -1;

                if (e.type !== 'virus' && e.energy > 200) {
                    e.energy /= 2;
                    let nc = Math.random() < mutationProb ? getRandomColor(e.type) : e.color;
                    spawnEntity(e.x, e.y, e.type, nc);
                }
            }
        }

        // Dibujar entidades (fuera del if de pausa para que se vean quietas)
        for (let e of entities) {
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.angle);
            let wobble = Math.sin(tick * 0.1 + e.offset) * 1.5; 
            ctx.fillStyle = e.color;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            if (e.type === 'herbivora') ctx.ellipse(0, 0, e.size + wobble, e.size * 0.6 + wobble * 0.5, 0, 0, Math.PI * 2);
            else if (e.type === 'carnivora' || e.type === 'hongo') ctx.arc(0, 0, e.size + wobble * 0.5, 0, Math.PI * 2);
            else if (e.type === 'virus') {
                ctx.moveTo(e.size + wobble, 0); ctx.lineTo(-e.size, e.size); ctx.lineTo(-e.size, -e.size);
            }
            ctx.fill();
            ctx.restore();
        }
    }
    loop();
</script>
</body>
</html>
